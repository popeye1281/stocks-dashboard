name: Update Stock Prices

on:
  schedule:
    # Runs at 12:00 UTC (5:30 PM IST) on weekdays, after Indian market close
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch latest prices
        run: python scripts/update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_prices.csv
          git diff --staged --quiet || git commit -m "Auto-update stock prices"
          git push
